services:
  # ── Web API ────────────────────────────────────────────────────────────────
  - type: web
    name: problabs-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: ADMIN_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: UNSUBSCRIBE_SECRET
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: ENABLE_NURTURE_EMAILS
        value: "true"

  # ── Daily Lottery Ingest Cron Job ──────────────────────────────────────────
  # Runs at 10:15 PM ET (02:15 UTC next day) — after the last Cash Pop draw.
  - type: cron
    name: lottery-ingest-daily
    runtime: python
    plan: starter
    schedule: "15 2 * * *"       # 02:15 UTC = 10:15 PM ET (after all draws settle)
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: python engine/ingest_daily.py
    envVars:
      - key: DATABASE_URL
        sync: false          # same value as the web service
