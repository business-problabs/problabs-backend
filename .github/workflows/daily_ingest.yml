name: Florida Lottery Daily Ingest

on:
  schedule:
    # Runs at 10:00 AM UTC (6:00 AM EST)
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run Lottery Ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: .
        run: python engine/ingest_daily.py

      - name: Create Job Summary
        if: always()
        run: |
          echo "### 🚀 ProbLabs Ingest Report" >> $GITHUB_STEP_SUMMARY
          echo "* **Status:** Complete" >> $GITHUB_STEP_SUMMARY
          echo "* **Python Version:** 3.13" >> $GITHUB_STEP_SUMMARY
          echo "* **Log Retention:** 14 Days" >> $GITHUB_STEP_SUMMARY
